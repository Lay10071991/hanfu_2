spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hanfu_cultural_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowMultiQueries=true&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  jpa:
    hibernate:
      ddl-auto: none # 禁用自动表结构生成
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        connection.characterEncoding: UTF-8
        connection.useUnicode: true
        connection.charSet: UTF-8
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8
      schema-locations: classpath:activity.sql
      data-locations: classpath:activity.sql
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  main:
    banner-mode: off
  jackson:
    default-property-inclusion: non_null
    charset: UTF-8
    media-type: application/json;charset=UTF-8
    serialization:
      indent-output: true

server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true
  tomcat:
    uri-encoding: UTF-8

# 图片上传配置
image:
  upload:
    # 图片存储的基础路径（绝对路径）
    base-path: E:/hanfu-cultural-platform/backend/uploads
    # 允许的文件扩展名
    allowed-extensions: jpg,jpeg,png,gif,webp
    # 最大文件大小（MB）
    max-size: 10
  access:
    # 图片访问的基础URL（为空则使用相对路径）
    base-url: http://localhost:8082
